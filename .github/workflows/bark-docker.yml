name: Build & Push ACE-Step Docker Image

on:
  push:
    branches: [main]
    paths:
      - "bark-runpod/**"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bark-runpod
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jonkoduif/beathole-bark:v23
            ghcr.io/jonkoduif/beathole-bark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
